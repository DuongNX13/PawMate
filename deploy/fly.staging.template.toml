app = "__FLY_APP_NAME__"
primary_region = "__FLY_PRIMARY_REGION__"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
