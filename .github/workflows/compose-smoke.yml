name: Compose Smoke

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  compose-smoke:
    name: Docker Compose smoke on hosted runner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show docker versions
        run: |
          docker --version
          docker compose version

      - name: Build and start backend stack
        run: docker compose up -d --build postgres redis backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend health check did not become ready in time."
          docker compose logs
          exit 1

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Tear down compose stack
        if: always()
        run: docker compose down -v
