name: pawmate_mobile
description: "PawMate mobile scaffold for Phase 1 Day 1."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_map: ^8.3.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  geolocator: ^14.0.2
  google_fonts: ^6.3.2
  go_router: ^17.2.0
  http_proxy: ^1.2.3
  image_picker: ^1.2.1
  latlong2: ^0.9.1
  pin_code_fields: ^8.0.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
